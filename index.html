<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Contrapared Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#2B4590;--blue-dark:#1e3270;--blue-light:#3d5ab5;--lime:#C8D62B;--lime-dark:#a8b520;--black:#1A1A1A;--white:#ffffff;--gray-100:#f4f5f7;--gray-200:#e8eaee;--gray-300:#d1d5de;--gray-500:#8a90a0;--gray-700:#4a5068;--gray-900:#1e2030;--kids:#2B4590;--kids-light:#eef1fa;--hp-light:#f7f9d6;--academia-light:#f0f0f0;--radius:10px;--radius-lg:16px;--shadow-sm:0 2px 8px rgba(43,69,144,.10);--shadow:0 4px 20px rgba(43,69,144,.14);--shadow-lg:0 8px 40px rgba(43,69,144,.18);--sidebar-w:260px;--topbar-h:62px;--mobile-nav-h:68px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--gray-100);color:var(--black);font-size:15px;line-height:1.5}
button,input,select,textarea{font:inherit;border:0;outline:0}
img{display:block;max-width:100%;object-fit:cover}
#app{min-height:100vh}
.app-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.main-area{display:flex;flex-direction:column;min-width:0;background:var(--gray-100)}
.view{flex:1;padding:24px;overflow-y:auto}
.sidebar{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:var(--blue-dark);color:var(--white);overflow-y:auto;z-index:30}
.sidebar-brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand-logo{width:40px;height:40px;background:var(--lime);border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.brand-logo svg{width:26px;height:26px}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:900;line-height:1.1}
.brand-sub{font-size:.7rem;opacity:.6;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.sidebar-profile{margin:14px 12px;padding:12px;background:rgba(255,255,255,.08);border-radius:var(--radius);border:1px solid rgba(255,255,255,.1)}
.profile-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.6;margin-bottom:4px}
.profile-name{font-weight:700;font-size:.88rem}
.profile-role{font-size:.75rem;opacity:.7;margin-top:1px}
.side-nav{flex:1;padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;min-height:42px;padding:8px 12px;border-radius:var(--radius);color:rgba(255,255,255,.75);background:transparent;cursor:pointer;transition:all .15s;font-size:.88rem;font-weight:600}
.nav-item:hover{background:rgba(255,255,255,.1);color:var(--white)}
.nav-item.active{background:var(--blue);color:var(--white)}
.nav-icon{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.12);font-size:.8rem;flex-shrink:0}
.nav-item.active .nav-icon{background:var(--lime);color:var(--blue-dark)}
.nav-badge{margin-left:auto;min-width:20px;height:20px;padding:0 6px;background:var(--lime);color:var(--blue-dark);border-radius:10px;font-size:.65rem;font-weight:800;display:grid;place-items:center}
.sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;min-height:var(--topbar-h);padding:0 24px;background:var(--white);border-bottom:1px solid var(--gray-200);box-shadow:var(--shadow-sm)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;flex:1}
.topbar-date{font-size:.8rem;color:var(--gray-500);font-weight:500}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap input{width:100%;height:38px;padding:0 12px 0 36px;border:1.5px solid var(--gray-200);border-radius:20px;font-size:.85rem;background:var(--gray-100);transition:all .15s}
.search-wrap input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(43,69,144,.1)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-500);font-size:16px}
.menu-btn{display:none;width:38px;height:38px;border-radius:var(--radius);background:var(--gray-100);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.menu-btn span{width:18px;height:2px;background:var(--black);border-radius:2px;display:block}
.notif-btn{position:relative;width:38px;height:38px;background:var(--gray-100);border-radius:var(--radius);display:grid;place-items:center;cursor:pointer;font-size:18px;border:1.5px solid var(--gray-200)}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;height:var(--mobile-nav-h);background:var(--blue-dark);padding:8px 8px 12px;gap:4px;border-top:1px solid rgba(255,255,255,.08)}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;border-radius:10px;color:rgba(255,255,255,.6);cursor:pointer;font-size:.62rem;font-weight:700;text-transform:uppercase;background:transparent;transition:all .15s;position:relative}
.mobile-nav-item.active{color:var(--lime)}
.mobile-nav-item .mn-icon{font-size:20px;line-height:1}
.mobile-nav-badge{position:absolute;top:4px;right:calc(50% - 16px);min-width:16px;height:16px;padding:0 4px;background:var(--lime);color:var(--blue-dark);border-radius:8px;font-size:.58rem;font-weight:800;display:grid;place-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;min-height:38px;border-radius:var(--radius);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;white-space:nowrap;border:1.5px solid transparent}
.btn-primary{background:var(--blue);color:var(--white)}.btn-primary:hover{background:var(--blue-dark)}
.btn-lime{background:var(--lime);color:var(--blue-dark)}.btn-lime:hover{background:var(--lime-dark)}
.btn-ghost{background:var(--white);color:var(--black);border-color:var(--gray-200)}.btn-ghost:hover{background:var(--gray-100)}
.btn-danger{background:#e53e3e;color:var(--white)}
.btn-sm{padding:5px 10px;min-height:30px;font-size:.78rem}
.btn-full{width:100%}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.card-title{font-size:1rem;font-weight:700}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:4px}
.section-sub{font-size:.85rem;color:var(--gray-500);margin-bottom:16px}
.tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:11px;font-size:.7rem;font-weight:700;white-space:nowrap}
.tag-kids{background:var(--kids-light);color:var(--kids)}
.tag-hp{background:var(--hp-light);color:#5a6010}
.tag-academia{background:var(--academia-light);color:var(--black)}
.tag-green{background:#d1fae5;color:#065f46}
.tag-red{background:#fee2e2;color:#991b1b}
.tag-amber{background:#fef3c7;color:#92400e}
.tag-blue{background:var(--kids-light);color:var(--kids)}
.tag-gray{background:var(--gray-200);color:var(--gray-700)}
.kpi-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px;border-left:4px solid var(--blue)}
.kpi-card.lime{border-left-color:var(--lime)}.kpi-card.red{border-left-color:#e53e3e}.kpi-card.black{border-left-color:var(--black)}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;line-height:1}
.kpi-label{font-size:.8rem;color:var(--gray-500);font-weight:600;margin-top:3px}
.student-list{display:grid;gap:10px}
.student-card{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;padding:14px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s}
.student-card:hover{border-color:var(--blue);box-shadow:var(--shadow-sm)}
.avatar{width:46px;height:46px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:.95rem;color:var(--white)}
.avatar-blue{background:var(--blue)}.avatar-lime{background:#5a6010}.avatar-black{background:var(--black)}
.student-name{font-weight:700;font-size:.92rem;margin-bottom:3px}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.78rem;color:var(--gray-500)}
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cat-tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius);border:2px solid var(--gray-200);background:var(--white);cursor:pointer;font-weight:700;font-size:.88rem;transition:all .18s}
.cat-tab .cat-dot{width:10px;height:10px;border-radius:50%}
.cat-tab:hover{border-color:var(--blue)}
.cat-tab.ak-kids{border-color:var(--kids);background:var(--kids-light);color:var(--kids)}
.cat-tab.ak-hp{border-color:var(--lime-dark);background:var(--hp-light);color:#4a5010}
.cat-tab.ak-academia{border-color:var(--black);background:var(--academia-light);color:var(--black)}
.cat-tab.ak-all{border-color:var(--blue);background:var(--kids-light);color:var(--blue)}
.progress-row{display:grid;grid-template-columns:110px 1fr 40px;align-items:center;gap:10px;font-size:.82rem}
.progress-bar{height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-light));border-radius:4px}
.att-grid{display:grid;gap:10px}
.att-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:12px 14px;background:var(--gray-100);border-radius:var(--radius)}
.att-btn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:20px;cursor:pointer;transition:all .15s;border:2px solid var(--gray-300);background:var(--white)}
.att-btn.check{border-color:#22c55e;background:#d1fae5;color:#15803d}
.att-btn.cross{border-color:#ef4444;background:#fee2e2;color:#b91c1c}
.chat-layout{display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 160px);border:1px solid var(--gray-200);border-radius:var(--radius-lg);overflow:hidden;background:var(--white)}
.conv-list{overflow-y:auto;border-right:1px solid var(--gray-200);background:var(--white)}
.conv-card{padding:12px 14px;background:var(--white);border-bottom:1px solid var(--gray-200);cursor:pointer;transition:all .15s}
.conv-card:hover{background:var(--gray-100)}
.conv-card.active{border-left:4px solid var(--blue);background:var(--kids-light)}
.conv-title{font-weight:700;font-size:.88rem;margin-bottom:2px}
.conv-sub{font-size:.76rem;color:var(--gray-500)}
.chat-panel{background:var(--white);display:flex;flex-direction:column;height:100%}
.chat-head{padding:14px 16px;background:var(--blue-dark);color:var(--white)}
.chat-head-title{font-weight:700;font-size:.95rem}
.chat-head-sub{font-size:.78rem;opacity:.7;margin-top:2px}
.chat-messages{padding:16px;display:grid;gap:10px;flex:1;overflow-y:auto;align-content:start}
.bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.5}
.bubble-theirs{background:var(--gray-100);color:var(--black);border-radius:14px 14px 14px 4px}
.bubble-mine{background:var(--blue);color:var(--white);margin-left:auto;border-radius:14px 14px 4px 14px}
.bubble-time{font-size:.68rem;margin-top:4px;opacity:.7}
.chat-compose{display:flex;gap:8px;padding:12px;border-top:1px solid var(--gray-200);background:var(--gray-100)}
.chat-compose input{flex:1;height:40px;padding:0 14px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--white);font-size:.88rem}
.chat-compose input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,69,144,.1)}
.cal-layout{display:grid;grid-template-columns:1fr 300px;gap:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-weekday{text-align:center;font-size:.7rem;font-weight:800;color:var(--gray-500);padding:6px 2px;text-transform:uppercase}
.cal-day{min-height:72px;padding:6px;background:var(--white);border:1px solid var(--gray-200);border-radius:8px;cursor:pointer;transition:all .12s;text-align:left;display:grid;align-content:start;gap:2px}
.cal-day:hover,.cal-day.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(43,69,144,.12)}
.cal-day.sel{background:var(--kids-light)}
.cal-day.today .cal-day-num{display:inline-grid;place-items:center;width:24px;height:24px;background:var(--blue);color:var(--white);border-radius:50%}
.cal-day.muted{opacity:.4}
.cal-day-num{font-size:.78rem;font-weight:700}
.cal-event{font-size:.62rem;font-weight:700;padding:2px 4px;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-event-kids{background:var(--kids-light);color:var(--kids)}
.cal-event-hp{background:var(--hp-light);color:#5a6010}
.cal-event-academia{background:var(--academia-light);color:var(--black)}
#modal-root{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(26,26,26,.5);backdrop-filter:blur(4px)}
#modal-root.open{display:flex}
.modal{width:min(640px,100%);max-height:90vh;background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column}
.modal-wide{max-width:760px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--gray-200);flex-shrink:0}
.modal-title{font-weight:800;font-size:1.05rem}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--gray-100);cursor:pointer;display:grid;place-items:center;font-size:18px;color:var(--gray-700)}
.modal-body{padding:20px;overflow-y:auto}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.8rem;font-weight:700;color:var(--gray-700);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:.9rem;background:var(--white);color:var(--black);transition:border .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,69,144,.1)}
.form-textarea{min-height:80px;resize:vertical}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.auth-screen{min-height:100vh;background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 60%,#1e3060 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{width:min(900px,100%);background:var(--white);border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lg);display:grid;grid-template-columns:1fr 1fr;min-height:580px}
.auth-hero{background:var(--blue-dark);padding:40px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
.auth-hero::before{content:'';position:absolute;inset:0;background:url('https://contrapared.mx/wp-content/themes/contrapared/assets/img/KIDS.jpg') center/cover;opacity:.2}
.auth-hero-content{position:relative;z-index:1;color:var(--white)}
.auth-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:auto;padding-bottom:40px}
.auth-logo-box{width:52px;height:52px;background:var(--lime);border-radius:14px;display:grid;place-items:center}
.auth-logo-box svg{width:34px;height:34px}
.auth-brand{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;color:var(--white)}
.auth-brand small{display:block;font-size:.75rem;opacity:.7;font-weight:500;letter-spacing:.06em;font-family:'Barlow',sans-serif}
.auth-hero h1{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:900;line-height:1;margin-bottom:8px}
.auth-hero p{font-size:.92rem;opacity:.8;line-height:1.5}
.auth-panel{padding:40px;overflow-y:auto;display:flex;flex-direction:column;justify-content:center}
.auth-divider{display:flex;align-items:center;gap:10px;color:var(--gray-400);font-size:.8rem;margin:16px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.legal-box{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;max-height:240px;overflow-y:auto;font-size:.85rem;line-height:1.7;color:var(--gray-700);margin-bottom:14px}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer}
.checkbox-row input{width:18px;height:18px;margin-top:2px;accent-color:var(--blue);flex-shrink:0}
.period-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.period-badge.urgent{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);margin-bottom:12px;font-size:.88rem;border:1px solid}
.nps-scale{display:flex;gap:6px;flex-wrap:wrap}
.nps-btn{width:40px;height:40px;border-radius:8px;border:2px solid var(--gray-200);background:var(--white);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .12s}
.nps-btn.selected{border-color:var(--blue);background:var(--blue);color:var(--white)}
.star-row{display:flex;gap:8px}
.star-btn{font-size:28px;cursor:pointer;opacity:.3;transition:.12s}
.star-btn.on{opacity:1}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.muted{color:var(--gray-500);font-size:.82rem}
.fw-700{font-weight:700}.fw-800{font-weight:800}
.text-sm{font-size:.82rem}
.divider{height:1px;background:var(--gray-200);margin:16px 0}
.empty-state{padding:48px 24px;text-align:center;color:var(--gray-500);background:var(--gray-100);border-radius:var(--radius-lg);border:2px dashed var(--gray-300)}
.empty-state-icon{font-size:2.5rem;margin-bottom:12px}
.empty-state h3{font-size:1rem;font-weight:700;color:var(--gray-700);margin-bottom:6px}
.empty-state p{font-size:.85rem;line-height:1.5;max-width:32ch;margin:0 auto 16px}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:grid;gap:8px;pointer-events:none}
.toast{padding:12px 18px;background:var(--gray-900);color:var(--white);border-radius:var(--radius);font-size:.88rem;font-weight:600;box-shadow:var(--shadow);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{display:none;position:fixed;width:280px;height:100vh;left:0;top:0}
  .sidebar.open{display:flex;z-index:50;box-shadow:var(--shadow-lg)}
  .menu-btn{display:flex}
  .mobile-nav{display:flex}
  .view{padding:16px;padding-bottom:calc(var(--mobile-nav-h) + 16px)}
  .topbar{padding:0 16px}
  .search-wrap{display:none}
  .chat-layout{grid-template-columns:1fr;height:auto}
  .cal-layout{grid-template-columns:1fr}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}
  .auth-card{grid-template-columns:1fr}
  .auth-hero{display:none}
  .form-grid-2{grid-template-columns:1fr}
}
@media(max-width:520px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .cal-grid{gap:2px}
  .cal-day{min-height:54px;padding:4px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
// Polyfill flatMap for older browsers
if(!Array.prototype.flatMap){Array.prototype.flatMap=function(fn){return this.reduce(function(a,x){return a.concat(fn(x))},[]);};}


function deleteTeacherById(btn){deleteTeacher(btn.dataset.id);}
function saveTeacherById(btn){saveTeacher(btn.dataset.id);}
function deleteStudentById(btn){deleteStudent(btn.dataset.id);}
function openStudentModalById(btn){openStudentModal(btn.dataset.id);}
function saveStudentModalById(btn){saveStudentModal(btn.dataset.id);}
function openProgressModalById(btn){openProgressModal(btn.dataset.id);}
function saveProgressById(btn){saveProgress(btn.dataset.id);}
function saveChangeScheduleById(btn){saveChangeSchedule(btn.dataset.xid);}

var _unsub=null;

function startSync(){
  if(_unsub) _unsub();
  _unsub=window.fbDb.collection('academy').doc('main').onSnapshot(function(snap){
    if(snap.exists){
      var remote=snap.data();
      // Deep merge preserving local structure
      ST.data=Object.assign(emptyDB(),remote);
      try{localStorage.setItem('cp-data',JSON.stringify(ST.data))}catch(e){}
      if(ST.auth) renderViewOnly();
    }
  },function(err){console.warn('Sync error',err)});
}

async function save(){
  if(!window.fbDb){return}
  var d={
    students:ST.data.students||[],
    lessons:ST.data.lessons||[],
    teachers:ST.data.teachers||[],
    announcements:ST.data.announcements||[],
    services:ST.data.services||[],
    surveys:ST.data.surveys||[],
    conversations:ST.data.conversations||[],
    profiles:ST.data.profiles||{},
    activeProfileIds:ST.data.activeProfileIds||{},
    updatedAt:new Date().toISOString()
  };
  try{await window.fbDb.collection('academy').doc('main').set(d,{merge:true})}
  catch(e){console.warn('Save failed',e)}
  try{localStorage.setItem('cp-data',JSON.stringify(ST.data))}catch(e){}
}

async function loadRemote(){
  try{
    var snap=await window.fbDb.collection('academy').doc('main').get();
    if(snap.exists){ST.data=Object.assign(emptyDB(),snap.data());return true}
  }catch(e){console.warn('Load failed',e)}
  try{var s=localStorage.getItem('cp-data');if(s)ST.data=Object.assign(emptyDB(),JSON.parse(s))}catch(e){}
  return false;
}

function toIso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayIso(){return toIso(new Date())}
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fullName(s){return[s.firstName,s.paternal,s.maternal].filter(Boolean).join(' ')}
function initials(s){return[s.firstName,s.paternal].filter(Boolean).map(function(p){return p[0].toUpperCase()}).join('')}
function getAge(dob){var b=new Date(dob+'T00:00:00'),t=new Date(),a=t.getFullYear()-b.getFullYear();if(t.getMonth()-b.getMonth()<0||(t.getMonth()-b.getMonth()===0&&t.getDate()<b.getDate()))a--;return a}
function formatDate(v){if(!v)return'';try{return new Intl.DateTimeFormat('es-MX',{day:'numeric',month:'short',year:'numeric'}).format(new Date(v+'T00:00:00'))}catch(e){return v}}
function formatShort(v){if(!v)return'';try{return new Intl.DateTimeFormat('es-MX',{day:'numeric',month:'short'}).format(new Date(v+'T00:00:00'))}catch(e){return v}}
function formatMonth(m){try{var s=new Intl.DateTimeFormat('es-MX',{month:'long',year:'numeric'}).format(new Date(m+'-01T00:00:00'));return s[0].toUpperCase()+s.slice(1)}catch(e){return m}}
function formatMoney(v){return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(v||0)}
function daysUntil(ds){if(!ds)return 999;var d=new Date(ds+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/864e5)}
function getStudent(id){return(ST.data.students||[]).find(function(s){return s.id===id})}
function getTeacher(id){return(ST.data.teachers||[]).find(function(t){return t.id===id})||{name:'Sin asignar'}}
function catTag(cat){var m={kids:'tag-kids',hp:'tag-hp',academia:'tag-academia'};return'<span class="tag '+(m[cat]||'tag-gray')+'">'+(CATS[cat]?CATS[cat].label:cat)+'</span>'}
function avatarColor(cat){return cat==='kids'?'avatar-blue':cat==='hp'?'avatar-lime':'avatar-black'}
function avgProgress(s){var v=Object.values(s.progress||{});return v.length?Math.round(v.reduce(function(a,b){return a+Number(b)},0)/v.length):0}
function attRate(s){
  if(!s.attendance||!s.attendance.length)return 100;
  var valid=s.attendance.filter(function(a){return a.status==='ok'||a.status==='no'});
  if(!valid.length)return 100;
  var ok=valid.filter(function(a){return a.status==='ok'}).length;
  return Math.round(ok/valid.length*100);
}

// ─── PROFILE LOOKUP ──────────────────────────────────────────────────────────
// Single source of truth: user's profile is identified by their Firebase UID stored in Firestore users/<uid>
// We store profileId = role + '-' + uid, so we can always reconstruct it
function getMyProfile(){
  var uid=ST.currentUserId;
  var role=ST.role;
  if(!uid) return null;
  var profileId=role+'-'+uid;
  var profiles=ST.data.profiles||{};
  var list=profiles[role]||[];
  // Find exact match first
  var p=list.find(function(x){return x.id===profileId});
  if(p) return p;
  // Fallback: match by email
  var email=ST.currentUserEmail;
  if(email) p=list.find(function(x){return x.email===email});
  if(p) return p;
  // Fallback: match by uid in id
  p=list.find(function(x){return x.id&&x.id.indexOf(uid)!==-1});
  return p||null;
}

function getVisibleStudents(){
  var all=ST.data.students||[];
  if(ST.role==='family'){
    var p=getMyProfile();
    var ids=new Set((p&&p.linkedStudents)||[]);
    return ids.size?all.filter(function(s){return ids.has(s.id)}):[];
  }
  if(ST.role==='teacher'){
    var p2=getMyProfile();
    var t=p2&&(ST.data.teachers||[]).find(function(tc){return tc.id===p2.teacherId});
    if(!t) return [];
    return all.filter(function(s){return s.teacherId===t.id});
  }
  return all;
}
function getVisibleLessons(){
  // Admin and director see ALL lessons and events
  if(ST.role==='admin'||ST.role==='director') return ST.data.lessons||[];
  // Teacher sees their own lessons
  if(ST.role==='teacher'){
    var p=getMyProfile();
    var t=p&&(ST.data.teachers||[]).find(function(tc){return tc.id===p.teacherId});
    if(t) return(ST.data.lessons||[]).filter(function(l){return l.teacherId===t.id});
    return [];
  }
  // Family sees lessons their students are in
  var ids=new Set(getVisibleStudents().map(function(s){return s.id}));
  return(ST.data.lessons||[]).filter(function(l){
    return(l.students||[]).some(function(id){return ids.has(id)});
  });
}
function getVisibleConversations(){
  if(ST.role==='director') return ST.data.conversations||[];
  return(ST.data.conversations||[]).filter(function(c){return(c.roles||[]).indexOf(ST.role)!==-1});
}
function getNearBirthdays(){
  return(ST.data.students||[]).filter(function(s){
    if(!s.dob) return false;
    var b=new Date(s.dob+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
    var nb=new Date(t.getFullYear(),b.getMonth(),b.getDate());
    if(nb<t) nb.setFullYear(t.getFullYear()+1);
    return Math.round((nb-t)/864e5)<=14;
  });
}

function doLogin(){
  var email=(document.getElementById('li-email')?.value||'').trim();
  var pass=document.getElementById('li-pass')?.value||'';
  if(!email||!pass){setErr('li-err','Ingresa tu correo y contraseña');return}
  var btn=document.querySelector('.auth-panel .btn-primary');
  if(btn){btn.textContent='Entrando…';btn.disabled=true}
  window.fbSignIn(window.fbAuth,email,pass)
    .then(async function(cred){
      await bootUser(cred.user);
    })
    .catch(function(err){
      var msgs={'auth/user-not-found':'No encontramos esa cuenta','auth/wrong-password':'Contraseña incorrecta','auth/invalid-credential':'Correo o contraseña incorrectos','auth/invalid-email':'Correo inválido'};
      setErr('li-err',msgs[err.code]||'Error al iniciar sesión');
      if(btn){btn.textContent='Entrar';btn.disabled=false}
    });
}

function doRegister(){
  var name=(document.getElementById('reg-name')?.value||'').trim();
  var email=(document.getElementById('reg-email')?.value||'').trim();
  var pass=document.getElementById('reg-pass')?.value||'';
  var phone=(document.getElementById('reg-phone')?.value||'').trim();
  var role=regData.role||'family';
  if(!name){setErr('reg-err','Escribe tu nombre completo');return}
  if(!email||!email.includes('@')){setErr('reg-err','Ingresa un correo válido');return}
  if(pass.length<6){setErr('reg-err','La contraseña debe tener al menos 6 caracteres');return}
  var btn=document.querySelector('.auth-panel .btn-primary:last-child');
  if(btn){btn.textContent='Creando cuenta…';btn.disabled=true}
  window.fbSignUp(window.fbAuth,email,pass)
    .then(async function(cred){
      var uid=cred.user.uid;
      // Load existing academy data first
      await loadRemote();
      // Build profile with deterministic ID
      var profileId=role+'-'+uid;
      var profile={id:profileId,name:name,email:email,phone:phone,role:role,linkedStudents:[]};
      if(role==='family'){
        var fn=(document.getElementById('reg-fn')?.value||'').trim();
        var pn=(document.getElementById('reg-pn')?.value||'').trim();
        var dob=document.getElementById('reg-dob')?.value||'';
        var cat=document.getElementById('reg-cat')?.value||'kids';
        var sched='';
        var gender=document.getElementById('reg-gender')?.value||'Pendiente';
        var med=(document.getElementById('reg-med')?.value||'').trim()||'Sin observaciones';
        var imgConsent=!!document.getElementById('reg-img')?.checked;
        if(fn&&pn&&dob){
          var sid=(fn[0]+pn[0]+'-'+dob.replaceAll('-','')).toUpperCase();
          var t=(ST.data.teachers||[]).find(function(t){return(t.cats||[]).indexOf(cat)!==-1});
          var pe=new Date();pe.setMonth(pe.getMonth()+2);
          var student={id:sid,firstName:fn,paternal:pn,maternal:(document.getElementById('reg-mn')?.value||'').trim(),dob:dob,gender:gender,cat:cat,teacherId:t?t.id:null,schedule:sched,enrolledAt:todayIso(),periodEnd:toIso(pe),photo:'',medical:med,imageConsent:imgConsent,progress:{technique:50,tactics:50,physical:50,attitude:70},attendance:[],payments:[],notes:[],media:[],parents:[{name:name,phone:phone,email:email,relationship:'Tutor'}]};
          ST.data.students=ST.data.students||[];
          // avoid duplicate
          if(!ST.data.students.find(function(s){return s.id===sid})) ST.data.students.push(student);
          profile.linkedStudents=[sid];
        }
      }
      if(role==='teacher'){
        var spec=(document.getElementById('reg-spec')?.value||'').trim()||'Profesor de academia';
        var teacherId='t-'+uid;
        ST.data.teachers=ST.data.teachers||[];
        ST.data.teachers=ST.data.teachers.filter(function(t){return t.email!==email});
        ST.data.teachers.push({id:teacherId,name:name,phone:phone,email:email,specialty:spec,cats:['kids','hp','academia']});
        profile.teacherId=teacherId;profile.specialty=spec;
      }
      // Save profile to shared data
      ST.data.profiles=ST.data.profiles||{};
      ST.data.profiles[role]=ST.data.profiles[role]||[];
      ST.data.profiles[role]=ST.data.profiles[role].filter(function(p){return p.email!==email});
      ST.data.profiles[role].push(profile);
      ST.data.activeProfileIds=ST.data.activeProfileIds||{};
      ST.data.activeProfileIds[role]=profileId;
      // Save user doc to Firestore
      await window.fbDb.collection('users').doc(uid).set({role:role,profileId:profileId,name:name,email:email,createdAt:new Date().toISOString()},{merge:true});
      // Cache locally for offline fallback
      try{localStorage.setItem('cp-user-'+uid,JSON.stringify({role:role,profileId:profileId,name:name,email:email}))}catch(e){}
      // Save academy data
      await save();
      // Log in
      await bootUser(cred.user);
    })
    .catch(function(err){
      var msgs={'auth/email-already-in-use':'Ya existe una cuenta con ese correo. Inicia sesión.','auth/weak-password':'Contraseña muy corta','auth/invalid-email':'Correo inválido'};
      setErr('reg-err',msgs[err.code]||'Error: '+err.message);
      if(btn){btn.textContent='Crear cuenta y entrar →';btn.disabled=false}
    });
}

async function bootUser(fbUser){
  ST.currentUserId=fbUser.uid;
  ST.currentUserEmail=fbUser.email;
  try{
    var usnap=await window.fbDb.collection('users').doc(fbUser.uid).get();
    var ud=usnap.exists?usnap.data():null;
    if(!ud){
      // User exists in Firebase Auth but not in Firestore — show auth to complete profile
      ST.auth=false;
      authScreen='reg3';
      regData={role:'family',cat:'kids'};
      render();
      return;
    }
    var role=ud.role||'family';
    await loadRemote();
    ST.role=role;
    ST.auth=true;
    ST.view='home';
    ST.selectedDate=todayIso();
    ST.calendarMonth=todayIso().slice(0,7);
    var convs=getVisibleConversations();
    ST.selectedConversationId=convs.length?convs[0].id:null;
    cleanLegacyData();
    startSync();
    render();
  }catch(e){
    console.error('bootUser error',e);
    // Network error — try loading from localStorage cache
    try{
      var cached=localStorage.getItem('cp-data');
      if(cached) ST.data=Object.assign(emptyDB(),JSON.parse(cached));
      var cachedUser=localStorage.getItem('cp-user-'+fbUser.uid);
      if(cachedUser){
        var cu=JSON.parse(cachedUser);
        ST.role=cu.role||'family';ST.auth=true;ST.view='home';
        ST.selectedDate=todayIso();ST.calendarMonth=todayIso().slice(0,7);
        render();return;
      }
    }catch(e2){}
    ST.auth=false;render();
  }
}

function renderStudents(){

function buildStudentSchedule(students){
  var schedule=[];
  var dayNames=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  students.forEach(function(s){
    var t=getTeacher(s.teacherId);
    var cat=CATS[s.cat]||{};
    // Find lessons for this student to get which days they attend
    var studentLessons=(ST.data.lessons||[]).filter(function(l){return(l.students||[]).indexOf(s.id)!==-1});
    if(studentLessons.length){
      // Group by time slot
      var byTime={};
      studentLessons.forEach(function(l){
        var key=l.time||'';
        if(!byTime[key])byTime[key]={days:[],time:key};
        var dow=new Date(l.date+'T00:00:00').getDay();
        if(byTime[key].days.indexOf(dayNames[dow])===-1)byTime[key].days.push(dayNames[dow]);
      });
      Object.values(byTime).forEach(function(slot){
        schedule.push({studentName:fullName(s),cat:s.cat,time:slot.time,days:slot.days.slice(0,3).join(', '),teacherName:t.name,courts:(cat.courts||[]).join(', '),enrolledAt:s.enrolledAt,periodEnd:s.periodEnd});
      });
    }else{
      // No lessons yet, show schedule from profile
      // No class assigned yet - skip
    }
  });
  return schedule;
}

function saveAddChild(){
  var fn=(document.getElementById('ac-fn')?.value||'').trim();
  var pn=(document.getElementById('ac-pn')?.value||'').trim();
  var dob=document.getElementById('ac-dob')?.value||'';
  var mn=(document.getElementById('ac-mn')?.value||'').trim();
  var cat=document.getElementById('ac-cat')?.value||'kids';
  var sched='';
  var gender=document.getElementById('ac-gender')?.value||'Pendiente';
  var med=(document.getElementById('ac-med')?.value||'').trim()||'Sin observaciones';
  var imgConsent=!!document.getElementById('ac-img')?.checked;

  if(!fn||!pn||!dob){toast('Por favor completa el nombre y la fecha de nacimiento del hijo');return}

  // Get profile using UID-based lookup
  var uid=ST.currentUserId;
  var email=ST.currentUserEmail;
  var profileId='family-'+uid;
  var profiles=ST.data.profiles||{};
  var familyList=profiles.family||[];

  // Find profile - first by deterministic ID, then by email
  var profile=familyList.find(function(p){return p.id===profileId});
  if(!profile) profile=familyList.find(function(p){return p.email===email});
  if(!profile){
    // Create the profile if it doesn't exist (edge case)
    profile={id:profileId,name:ST.currentUserEmail||'Familia',email:email||'',phone:'',role:'family',linkedStudents:[]};
    familyList.push(profile);
    ST.data.profiles.family=familyList;
  }

  var sid=(fn[0]+pn[0]+'-'+dob.replaceAll('-','')).toUpperCase();
  var t=(ST.data.teachers||[]).find(function(t){return(t.cats||[]).indexOf(cat)!==-1});
  var pe=new Date();pe.setMonth(pe.getMonth()+2);

  var student={
    id:sid,firstName:fn,paternal:pn,maternal:mn,dob:dob,
    gender:gender,cat:cat,teacherId:t?t.id:null,
    schedule:sched,enrolledAt:todayIso(),periodEnd:toIso(pe),
    photo:'',medical:med,imageConsent:imgConsent,
    progress:{technique:50,tactics:50,physical:50,attitude:70},
    attendance:[],payments:[],notes:[],media:[],
    parents:[{name:profile.name||'Tutor',phone:profile.phone||'',email:profile.email||'',relationship:'Tutor'}]
  };

  ST.data.students=ST.data.students||[];
  if(!ST.data.students.find(function(s){return s.id===sid})){
    ST.data.students.push(student);
  }

  if(!profile.linkedStudents) profile.linkedStudents=[];
  if(profile.linkedStudents.indexOf(sid)===-1) profile.linkedStudents.push(sid);

  // Update profile in list
  var idx=ST.data.profiles.family.findIndex(function(p){return p.id===profile.id});
  if(idx>=0) ST.data.profiles.family[idx]=profile;

  save();
  closeModal();
  toast('¡'+fn+' agregado/a correctamente!');
  renderViewOnly();
}

function renderCalendar(){

  var lMap=lessons.reduce(function(m,l){m[l.date]=m[l.date]||[];m[l.date].push(l);return m},{});
  var days=buildCalDays(ST.calendarMonth);
  var today=todayIso();
  var grid=days.map(function(d){
    var iso=toIso(d);
    var inM=iso.startsWith(ST.calendarMonth);
    var dl=lMap[iso]||[];
    var isT=iso===today;
    var isSel=iso===ST.selectedDate;
    var calCls='cal-day '+(isSel?'sel':'')+' '+(isT?'today':'')+' '+(!inM?'muted':'');
    return'<button class="'+calCls+'" onclick="selDate(this.dataset.d)" data-d="'+iso+'">'+
      '<span class="cal-day-num">'+d.getDate()+'</span>'+
      dl.slice(0,2).map(function(l){return'<span class="cal-event cal-event-'+l.cat+'">'+h((l.time||'').split('-')[0])+' '+(CATS[l.cat]?CATS[l.cat].label.split(' ')[0]:l.cat)+'</span>'}).join('')+
      (dl.length>2?'<span style="font-size:.6rem;color:var(--gray-500)">+'+( dl.length-2)+'</span>':'')+
    '</button>';
  }).join('');

  // Build itinerary view for the selected month
  var monthLessons=lessons.filter(function(l){return l.date&&l.date.startsWith(ST.calendarMonth)}).sort(function(a,b){return a.date.localeCompare(b.date)});

  // Group by week
  var weeks=[];
  monthLessons.forEach(function(l){
    var d=new Date(l.date+'T00:00:00');
    var weekNum=Math.floor((d.getDate()-1)/7);
    weeks[weekNum]=weeks[weekNum]||[];

  return'<div class="section-title">Calendario de clases</div>'+

    '<div>'+

        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
          '<span class="fw-700">'+formatMonth(ST.calendarMonth)+'</span>'+
          '<div style="display:flex;gap:6px">'+
            (can('createLesson')?'<button class="btn btn-primary btn-sm" onclick="openLessonModal()">+ Clase</button>':'')+
            (can('createLesson')?'<button class="btn btn-ghost btn-sm" onclick="openItineraryModal()">📋 Clases bimestrales</button>':'')+
            '<button class="btn btn-ghost btn-sm" onclick="shiftMonth(-1)">←</button>'+
            '<button class="btn btn-ghost btn-sm" onclick="shiftMonth(1)">→</button>'+
          '</div>'+
        '</div>'+
        '<div class="cal-grid">'+
          ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(function(d){return'<div class="cal-weekday">'+d+'</div>'}).join('')+
          grid+
        '</div>'+
      '</div>'+
      // Itinerary view below calendar
      '<div class="card">'+
        '<div class="card-header"><span class="card-title">📋 Itinerario de '+formatMonth(ST.calendarMonth)+'</span>'+
          '<span class="tag tag-blue">'+monthLessons.length+' clases</span></div>'+
        (monthLessons.length?
          '<div style="display:grid;gap:6px">'+monthLessons.map(function(l){
            var enrolled=(l.students||[]).map(function(id){return getStudent(id)}).filter(Boolean);

function previewItinerary(){

  var prev=document.getElementById('it-preview');
  if(prev){
    prev.style.display='block';
    if(dates.length){
      prev.textContent='Se generarán '+dates.length+' clases del '+formatShort(dates[0].date)+' al '+formatShort(dates[dates.length-1].date);
    }else{
      prev.textContent='Selecciona al menos un día de la semana';
    }

function getItineraryDates(){
  var start=new Date((document.getElementById('it-start')||{value:todayIso()}).value+'T00:00:00');
  // 2 months from start
  var end=new Date(start);end.setMonth(end.getMonth()+2);
  var checkedDays=[].slice.call(document.querySelectorAll('.it-day:checked')).map(function(el){return parseInt(el.value)});
  var dates=[];var cur=new Date(start);
  while(cur<=end){
    var dow=cur.getDay();
    if(checkedDays.indexOf(dow)!==-1){
      // find time for this day
      var timeSel=document.querySelector('.it-time-sel[data-day="'+dow+'"]');
      dates.push({date:toIso(cur),time:timeSel?timeSel.value:''});
    }
    cur.setDate(cur.getDate()+1);
    if(dates.length>300)break;
  }
  return dates;
}
function saveItinerary(){
  var cat=(document.getElementById('it-cat')||{value:'kids'}).value;
  var teacherId=(document.getElementById('it-teacher')||{value:''}).value;
  var schedKey=(document.getElementById('it-sched')||{value:''}).value;
  var title=(document.getElementById('it-focus')||{value:''}).value.trim()||schedKey;
  var startDate=new Date((document.getElementById('it-start')||{value:todayIso()}).value+'T00:00:00');
  var endDate=new Date(startDate);endDate.setMonth(endDate.getMonth()+2);
  var schedInfo=SCHED_DAYS[schedKey]||{days:[],time:''};
  if(!schedInfo.days.length){toast('Selecciona un horario válido');return}
  var dates=[];var cur=new Date(startDate);
  while(cur<=endDate){
    if(schedInfo.days.indexOf(cur.getDay())!==-1) dates.push(toIso(cur));
    cur.setDate(cur.getDate()+1);
    if(dates.length>300)break;
  }
  if(!dates.length){toast('No se encontraron fechas para ese horario');return}
  var added=0;
  dates.forEach(function(date,i){
    var existing=(ST.data.lessons||[]).find(function(l){
      return l.date===date&&l.time===schedInfo.time&&l.cat===cat&&!l.isEvent;
    });
    if(!existing){
      ST.data.lessons=ST.data.lessons||[];
      ST.data.lessons.push({
        id:'l-'+Date.now()+'-'+i,
        date:date,time:schedInfo.time,schedule:schedKey,
        cat:cat,teacherId:teacherId||null,
        court:'Rotación',focus:title,
        students:[],announcements:[],isEvent:false
      });
      added++;
    }
  });
  if(!added){toast('Todas las clases ya existen para ese período');return}
  save();closeModal();
  ST.selectedDate=dates[0];ST.calendarMonth=dates[0].slice(0,7);
  ST.view='misclases';render();toast(added+' clases generadas ✓');
}

function selDate(isoOrEl){var iso=typeof isoOrEl==='string'?isoOrEl:(isoOrEl&&isoOrEl.dataset?isoOrEl.dataset.d:isoOrEl);ST.selectedDate=iso;ST.calendarMonth=iso.slice(0,7);renderViewOnly()}
function shiftMonth(dir){var d=new Date(ST.calendarMonth+'-01T00:00:00');d.setMonth(d.getMonth()+dir);ST.calendarMonth=toIso(d).slice(0,7);renderViewOnly()}
function buildCalDays(month){var f=new Date(month+'-01T00:00:00');var s=new Date(f);var mi=(f.getDay()+6)%7;s.setDate(f.getDate()-mi);return Array.from({length:42},function(_,i){var d=new Date(s);d.setDate(s.getDate()+i);return d})}

    '📷 Imagen / 🎬 Video<input type="file" accept="image/*,video/*" style="display:none" onchange="previewImg(this,\'ca-preview\',\'ca-img-data\')"></label>'+
    '<input type="hidden" id="ca-img-data" value="'+ei+'"></div>'+

function saveClassAnnouncementById(btn){saveClassAnnouncement(btn.dataset.key,btn.dataset.annid||'');}
function saveClassAnnouncement(keyStr,annId){
  var title=(document.getElementById('ca-title')||{value:''}).value.trim();
  var body=(document.getElementById('ca-body')||{value:''}).value.trim();
  var media=(document.getElementById('ca-img-data')||{value:''}).value;
  if(!title){toast('Escribe un título');return;}
  var isVideo=media.startsWith('data:video/');
  var groupKey=getClassKey(keyStr);
  ST.data.classAnnouncements=ST.data.classAnnouncements||{};
  ST.data.classAnnouncements[groupKey]=ST.data.classAnnouncements[groupKey]||[];
  var myProfile=getMyProfile();
  var newAnn={
    id:annId||('ca-'+Date.now()),
    title:title,body:body,
    image:isVideo?'':media,
    video:isVideo?media:'',
    date:todayIso(),
    authorName:(myProfile&&myProfile.name)||ST.role
  };
  if(annId){
    var idx=ST.data.classAnnouncements[groupKey].findIndex(function(a){return a.id===annId;});
    if(idx>=0)ST.data.classAnnouncements[groupKey][idx]=newAnn;
    else ST.data.classAnnouncements[groupKey].push(newAnn);
  }else{
    ST.data.classAnnouncements[groupKey].push(newAnn);
  }
  save();closeModal();toast(annId?'Anuncio actualizado ✓':'Anuncio publicado ✓');
}
function deleteClassAnnouncement(keyStr,annId){
  var groupKey=getClassKey(keyStr);
  ST.data.classAnnouncements=ST.data.classAnnouncements||{};
  ST.data.classAnnouncements[groupKey]=(ST.data.classAnnouncements[groupKey]||[]).filter(function(a){return a.id!==annId;});
  save();toast('Anuncio eliminado');
}

// ─── PAGOS ────────────────────────────────────────────────────────────────────
function payAction(btn){
  var sid=btn.dataset.sid;var mon=btn.dataset.mon;var action=btn.dataset.action;var status=btn.dataset.status;
  if(action==='confirm')confirmPayment(sid,mon);
  else if(action==='reject')rejectPayment(sid,mon);
  else if(action==='delete')deletePayment(sid,mon);
  else if(action==='view')openStudent(sid);
  else if(action==='revert')setPaymentStatus(sid,mon,'Pendiente');
  else if(action==='revision')setPaymentStatus(sid,mon,'Comprobante en revisión');
  else if(action==='rechazar')setPaymentStatus(sid,mon,'Comprobante rechazado');
}
function renderPagos(){
  var all=ST.data.students||[];
  var allPay=[];
  all.forEach(function(s){
    (s.payments||[]).forEach(function(p){
      allPay.push(Object.assign({},p,{studentId:s.id,studentName:fullName(s),cat:s.cat}));
    });
  });
  var filterStatus=ST._payFilter||'all';
  var filterSearch=(ST._paySearch||'').toLowerCase();
  var filtered=allPay;
  if(filterStatus!=='all')filtered=filtered.filter(function(p){return p.status===filterStatus;});
  if(filterSearch)filtered=filtered.filter(function(p){return[p.studentName,p.month,p.status].join(' ').toLowerCase().indexOf(filterSearch)!==-1;});
  filtered=filtered.sort(function(a,b){return a.status==='Comprobante en revisión'?-1:b.status==='Comprobante en revisión'?1:0;});
  var pagado=allPay.filter(function(p){return p.status==='Pagado';}).reduce(function(s,p){return s+p.amount;},0);
  var pendiente=allPay.filter(function(p){return p.status!=='Pagado';}).reduce(function(s,p){return s+p.amount;},0);
  var enRevision=allPay.filter(function(p){return p.status==='Comprobante en revisión';}).length;
  var statusOpts=[['all','Todos'],['Pendiente','Pendientes'],['Comprobante en revisión','En revisión'],['Comprobante rechazado','Rechazados'],['Pagado','Pagados']];
  function mkBtn(action,label,cls,sid,mon,status){
    return'<button class="btn '+cls+' btn-sm" data-action="'+action+'" data-sid="'+sid+'" data-mon="'+mon+'"'+(status?' data-status="'+status+'"':'')+' onclick="payAction(this)">'+label+'</button>';
  }
  var rows=filtered.map(function(p){
    var s=getStudent(p.studentId);
    var isRev=p.status==='Comprobante en revisión';
    var isPaid=p.status==='Pagado';
    var isRej=p.status==='Comprobante rechazado';
    var sid=h(p.studentId);var mon=h(p.month);
    var tagCls=isPaid?'tag-green':isRev?'tag-amber':'tag-red';
    return'<div style="border:1.5px solid '+(isRev?'var(--lime)':'var(--gray-200)')+';border-radius:var(--radius-lg);padding:14px;background:'+(isRev?'var(--hp-light)':'var(--white)')+'">'+
      '<div style="display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center">'+
        '<div class="avatar '+(s?avatarColor(p.cat):'avatar-black')+'" style="width:38px;height:38px;font-size:.8rem">'+(s?initials(s):'?')+'</div>'+
        '<div>'+
          '<div class="fw-700">'+h(p.studentName)+'</div>'+
          '<div class="muted text-sm">'+h(p.month)+' · '+formatMoney(p.amount)+' · Vence '+formatDate(p.due)+'</div>'+
          (isPaid?'<div class="muted text-sm">Pagado el '+formatDate(p.paidAt)+'</div>':'')+
        '</div>'+
        '<span class="tag '+tagCls+'">'+h(p.status)+'</span>'+
      '</div>'+
      (isRev?
        '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-200)">'+
          (p.receipt?'<div style="margin-bottom:10px"><img src="'+h(p.receipt)+'" style="max-height:160px;border-radius:var(--radius);display:block;object-fit:contain;background:#f3f4f6"></div>':'<div class="muted text-sm mb-10">Sin imagen adjunta</div>')+
          '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
            mkBtn('confirm','✓ Validar','btn-primary',sid,mon,'')+
            mkBtn('reject','✕ Rechazar','btn-danger',sid,mon,'')+
            mkBtn('view','Ver alumno','btn-ghost',sid,mon,'')+
            mkBtn('delete','🗑','btn-danger',sid,mon,'')+
          '</div>'+
        '</div>':'')+ 
      (!isRev?
        '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">'+
          (!isPaid?mkBtn('confirm','✓ Pagado','btn-primary',sid,mon,''):'')+
          (isPaid?mkBtn('revert','↩ Revertir','btn-ghost',sid,mon,''):'')+
          (!isPaid?mkBtn('revision','En revisión','btn-ghost',sid,mon,''):'')+
          (!isPaid?mkBtn('rechazar','Rechazar','btn-ghost',sid,mon,''):'')+
          mkBtn('view','Ver','btn-ghost',sid,mon,'')+
          mkBtn('delete','🗑','btn-danger',sid,mon,'')+
        '</div>':'')+
    '</div>';
  }).join('');
  return'<div class="section-title">Pagos</div>'+
  '<div class="section-sub">Gestión de cobros y comprobantes</div>'+
  '<div class="grid-4 mb-16">'+
    kpi(formatMoney(pagado),'Cobrado','')+
    kpi(formatMoney(pendiente),'Por cobrar','red')+
    kpi(enRevision,'En revisión',enRevision?'lime':'')+
    kpi(all.length,'Alumnos','')+
  '</div>'+
  '<div class="card mb-16"><div class="card-header"><span class="card-title">Acciones</span></div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:8px">'+
      '<button class="btn btn-primary btn-sm" onclick="openGenerateBillingModal()">📋 Generar cobros del período</button>'+
      '<button class="btn btn-ghost btn-sm" onclick="exportPayments()">⬇️ Exportar CSV</button>'+
    '</div></div>'+
  '<div class="card">'+
    '<div class="card-header"><span class="card-title">Historial de pagos</span><span class="tag tag-gray">'+filtered.length+' registros</span></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+
      '<div style="position:relative;flex:1;min-width:180px">'+
        '<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-500)">🔍</span>'+
        '<input class="form-input" style="padding-left:32px" placeholder="Buscar alumno o mes…" value="'+h(ST._paySearch||'')+'" oninput="ST._paySearch=this.value;renderViewOnly()">'+
      '</div>'+
      '<select class="form-select" style="width:auto" onchange="ST._payFilter=this.value;renderViewOnly()">'+
        statusOpts.map(function(x){return'<option value="'+x[0]+'" '+(filterStatus===x[0]?'selected':'')+'>'+x[1]+'</option>';}).join('')+
      '</select>'+
    '</div>'+
    (rows?'<div style="display:grid;gap:8px">'+rows+'</div>':
      emptyState('💳','Sin registros de pago','Los cobros aparecerán cuando se generen.','',''))+
  '</div>';
}

    lessons=getLessonsByKey(groupKey).filter(function(l){return!l.isEvent}).sort(function(a,b){return a.date.localeCompare(b.date)});

      '<button data-lid="'+sel.id+'" data-sid="'+s.id+'" data-status="ok" onclick="setAttBtn(this)" style="width:44px;height:44px;border-radius:50%;border:2.5px solid '+(status==='ok'?'#059669':'var(--gray-300)')+';background:'+(status==='ok'?'#059669':'var(--white)')+';cursor:pointer;font-size:22px;font-weight:900;color:'+(status==='ok'?'white':'var(--gray-400)')+';display:grid;place-items:center">✓</button>'+
      '<button data-lid="'+sel.id+'" data-sid="'+s.id+'" data-status="no" onclick="setAttBtn(this)" style="width:44px;height:44px;border-radius:50%;border:2.5px solid '+(status==='no'?'#dc2626':'var(--gray-300)')+';background:'+(status==='no'?'#dc2626':'var(--white)')+';cursor:pointer;font-size:22px;font-weight:900;color:'+(status==='no'?'white':'var(--gray-400)')+';display:grid;place-items:center">✕</button>'+
    '</div>';

  var present=(Object.values(sel.attendance||{})).filter(function(v){return v==='ok'}).length;
  var absent=(Object.values(sel.attendance||{})).filter(function(v){return v==='no'}).length;

  return'<button class="btn btn-ghost btn-sm mb-16" onclick="navigate(\'misclases\')">← Volver a Mis Clases</button>'+

      '<div style="display:flex;gap:6px">'+
        '<button data-lid="'+sel.id+'" data-status="ok" onclick="setAllAttBtn(this)" class="btn btn-ghost btn-sm">✓ Todos</button>'+
        '<button data-lid="'+sel.id+'" data-status="no" onclick="setAllAttBtn(this)" class="btn btn-ghost btn-sm">✕ Todos</button>'+
      '</div>'+
    '</div>'+
    studentRows+

function setAtt(lessonId,studentId,status){
  var l=(ST.data.lessons||[]).find(function(x){return x.id===lessonId});
  if(!l)return;
  setAttData(l,studentId,status);
  save();renderViewOnly();
}
function setAttData(lesson,studentId,status){
  lesson.attendance=lesson.attendance||{};
  lesson.attendance[studentId]=status;
  var s=getStudent(studentId);
  if(!s)return;
  s.attendance=s.attendance||[];
  var ex=s.attendance.find(function(a){return a.lessonId===lesson.id});
  if(ex)ex.status=status;
  else s.attendance.push({lessonId:lesson.id,date:lesson.date,status:status});
}

    var sIds=new Set(myStudents.map(function(s){return s.id}));

  }else myLessons=(ST.data.lessons||[]).filter(function(l){return!l.isEvent});

  var groups={};

      var key=entry[0];var g=entry[1];

      var safeKey=key.replace(/\|\|/g,'__');

          '<div style="text-align:center;color:white"><div style="font-family:Barlow Condensed,sans-serif;font-size:1.6rem;font-weight:900">'+h(g.time||'–')+'</div><div style="font-size:.8rem;opacity:.8">'+h(CATS[g.cat]?CATS[g.cat].label:g.cat)+'</div></div>'+

        '</div>'+
        '<div style="padding:14px">'+catTag(g.cat)+
          '<div class="fw-700 mt-8">'+h(t.name)+'</div>'+

function ecsAll(v){[].slice.call(document.querySelectorAll('.ecs-student')).forEach(function(cb){cb.checked=v;});}
function saveEditClassStudents(safeKey){
  var selected=[].slice.call(document.querySelectorAll('.ecs-student:checked')).map(function(el){return el.value;});

  lessons.forEach(function(l){l.students=selected.slice();});

function deleteClassGroup(safeKey){
  var lessons=getLessonsByKey(safeKey);
  var lessonIds=new Set(lessons.map(function(l){return l.id}));
  ST.data.lessons=(ST.data.lessons||[]).filter(function(l){return!lessonIds.has(l.id)});
  var groupKey=getClassKey(safeKey);
  if(ST.data.classAnnouncements) delete ST.data.classAnnouncements[groupKey];
  save();closeModal();ST.view='misclases';render();toast('Grupo eliminado ✓');
}
function deleteLessonById(lid){
  ST.data.lessons=(ST.data.lessons||[]).filter(function(l){return l.id!==lid});
  save();closeModal();render();toast('Clase eliminada ✓');
}

// ─── MESSAGES ────────────────────────────────────────────────────────────────
function renderMessages(){
  var myProfile=getMyProfile();
  var myId=myProfile&&myProfile.id;
  var convs=(ST.data.conversations||[]).filter(function(conv){
    if(conv.participantIds&&conv.participantIds.length) return conv.participantIds.indexOf(myId)!==-1;
    return (conv.roles||[]).indexOf(ST.role)!==-1;
  });
  if(!ST.selectedConversationId||!convs.find(function(c){return c.id===ST.selectedConversationId})){
    ST.selectedConversationId=convs.length?convs[0].id:null;
  }
  var sel=convs.find(function(c){return c.id===ST.selectedConversationId});
  if(sel&&sel.unread) sel.unread[ST.role]=0;

  var convListHtml=convs.length?convs.map(function(conv){
    var unread=conv.unread&&conv.unread[ST.role]||0;
    var lastMsg=conv.messages&&conv.messages.length?conv.messages[conv.messages.length-1]:null;
    var isActive=conv.id===ST.selectedConversationId;
    var cls='conv-card'+(isActive?' active':'');
    return '<div style="display:flex;align-items:center">'+
      '<div class="'+cls+'" data-cid="'+conv.id+'" onclick="selConv(this.dataset.cid)" style="flex:1">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
          '<div class="conv-title">'+h(conv.title)+'</div>'+
          (unread?'<span class="nav-badge">'+unread+'</span>':'')+
        '</div>'+
        (lastMsg?'<div class="muted text-sm" style="font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(lastMsg.body)+'</div>':
          '<div class="muted text-sm" style="font-size:.72rem">Sin mensajes</div>')+
      '</div>'+
      '<button data-cid="'+conv.id+'" onclick="deleteConv(this.dataset.cid)" style="background:none;cursor:pointer;color:var(--gray-500);font-size:14px;padding:4px 6px" title="Eliminar">✕</button>'+
    '</div>';
  }).join(''):'<div style="padding:20px;text-align:center;color:var(--gray-500);font-size:.85rem">Sin conversaciones</div>';

  var chatHtml=sel?
    '<div class="chat-panel">'+
      '<div class="chat-head" style="flex-shrink:0">'+
        '<div class="chat-head-title">'+h(sel.title)+'</div>'+
        '<div class="chat-head-sub">'+h(sel.scope||'')+'</div>'+
      '</div>'+
      '<div class="chat-messages" id="chat-msgs">'+
      ((sel.messages||[]).length?(sel.messages||[]).map(function(m){
        var isMine=m.role===ST.role;
        return '<div>'+
          '<div class="bubble '+(isMine?'bubble-mine':'bubble-theirs')+'">'+h(m.body)+'</div>'+
          '<div class="bubble-time" style="text-align:'+(isMine?'right':'left')+'">'+h(m.author)+' · '+h(m.time)+'</div>'+
        '</div>';
      }).join(''):'<div style="text-align:center;color:var(--gray-500);padding:40px">¡Escribe el primer mensaje!</div>')+
      '</div>'+
      '<div class="chat-compose" style="flex-shrink:0">'+
        '<input id="msg-in" placeholder="Escribe un mensaje…" onkeydown="handleMsgKey(event)">'+
        '<button class="btn btn-primary" onclick="sendMsg()">Enviar</button>'+
      '</div>'+
    '</div>':
    '<div class="empty-state" style="margin-top:40px">Selecciona una conversación</div>';

  return '<div class="section-title">Mensajes</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
      '<button class="btn btn-primary btn-sm" onclick="openNewConvModal()">✉️ Mensaje directo</button>'+
      (can('createAnnouncement')?'<button class="btn btn-ghost btn-sm" onclick="openBroadcastModal()">📢 Masivo</button>':'')+
    '</div>'+
    '<div class="chat-layout">'+
      '<div class="conv-list">'+convListHtml+'</div>'+
      chatHtml+
    '</div>';
}

function selConv(id){ST.selectedConversationId=id;renderViewOnly()}
function deleteConv(id){
  ST.data.conversations=(ST.data.conversations||[]).filter(function(c){return c.id!==id});
  if(ST.selectedConversationId===id) ST.selectedConversationId=null;
  save();renderViewOnly();toast('Conversación eliminada');
}
function handleMsgKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}
function sendMsg(){
  var inp=document.getElementById('msg-in');
  var body=inp&&inp.value&&inp.value.trim();if(!body)return;
  var conv=(ST.data.conversations||[]).find(function(c){return c.id===ST.selectedConversationId});
  if(!conv)return;
  var now=new Date();
  var time=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var myProfile=getMyProfile();
  conv.messages=conv.messages||[];
  conv.messages.push({author:(myProfile&&myProfile.name)||ST.role,role:ST.role,body:body,time:time});
  Object.keys(conv.unread||{}).forEach(function(r){if(r!==ST.role)conv.unread[r]=(conv.unread[r]||0)+1});
  inp.value='';save();renderViewOnly();
  setTimeout(function(){var cm=document.getElementById('chat-msgs');if(cm)cm.scrollTop=cm.scrollHeight},50);
}
function getAllUsers(){
  var result=[];var profiles=ST.data.profiles||{};var myId=getMyProfile()&&getMyProfile().id;
  ['family','teacher','admin','director'].forEach(function(role){
    (profiles[role]||[]).forEach(function(p){if(p.id!==myId)result.push({id:p.id,name:p.name||p.email||role,email:p.email||'',role:role});});
  });return result;
}
function openNewConvModal(){
  var allUsers=getAllUsers();
  var roleLabels={family:'👨‍👩‍👧 Familia',teacher:'🎾 Profesor',admin:'⚙️ Admin',director:'📊 Dirección'};

  var userList='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:var(--gray-100);border-radius:var(--radius)">'+
    '<span>🔍</span><input id="nc-search" class="form-input" placeholder="Buscar por nombre…" style="border:none;background:transparent;padding:0" oninput="filterUserList(this.value)"></div>';
  Object.entries(byRole).forEach(function(entry){
    var role=entry[0],users=entry[1];
    userList+='<div class="nc-role-group" style="margin-bottom:12px"><div class="muted text-sm fw-700" style="margin-bottom:6px">'+roleLabels[role]+'</div>'+
      users.map(function(u){return'<label class="nc-user-row" data-name="'+h(u.name).toLowerCase()+'" style="display:flex;gap:10px;align-items:center;cursor:pointer;padding:8px;border-radius:var(--radius)">'+
        '<input type="checkbox" class="nc-user" value="'+u.id+'" data-role="'+u.role+'" data-name="'+h(u.name)+'" style="accent-color:var(--blue);width:16px;height:16px;flex-shrink:0">'+
        '<div><div class="fw-700 text-sm">'+h(u.name)+'</div><div class="muted text-sm" style="font-size:.75rem">'+h(u.email)+'</div></div></label>'}).join('')+'</div>';
  });
  if(!allUsers.length) userList='<div class="muted text-sm" style="padding:12px">Sin otros usuarios registrados.</div>';
  openModal('✉️ Nuevo mensaje directo',
    '<div style="max-height:240px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px;margin-bottom:12px">'+userList+'</div>'+
    '<div class="form-group"><label class="form-label">Mensaje</label><textarea class="form-textarea" id="nc-msg" style="min-height:80px" placeholder="Escribe tu mensaje…"></textarea></div>'+
    '<button class="btn btn-primary btn-full" onclick="saveNewConv()">Enviar</button>');
}
function filterUserList(q){[].slice.call(document.querySelectorAll('.nc-user-row')).forEach(function(row){row.style.display=(row.dataset.name||'').indexOf(q.toLowerCase())!==-1?'':'none'});}
function saveNewConv(){
  var selected=[].slice.call(document.querySelectorAll('.nc-user:checked'));
  var msg=(document.getElementById('nc-msg')||{value:''}).value.trim();
  if(!selected.length){toast('Selecciona al menos una persona');return}
  if(!msg){toast('Escribe un mensaje');return}
  var myProfile=getMyProfile();var myId=myProfile&&myProfile.id;
  var participantIds=[myId];var participantNames=[];var roles=new Set([ST.role]);
  selected.forEach(function(el){participantIds.push(el.value);participantNames.push(el.dataset.name||'');roles.add(el.dataset.role);});
  var title=participantNames.length===1?participantNames[0]:participantNames.slice(0,2).join(', ')+(participantNames.length>2?' +'+(participantNames.length-2):'');
  var now=new Date();
  var time=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var unread={};[...roles].forEach(function(r){unread[r]=r===ST.role?0:1});

  sv.respondedBy=sv.respondedBy||[];if(sv.respondedBy.indexOf(myId)===-1)sv.respondedBy.push(myId);

function viewResponses(id){
  var sv=(ST.data.surveys||[]).find(function(s){return s.id===id});if(!sv)return;
  var responses=sv.responses||[];var total=responses.length;
  if(!total){openModal('Resultados: '+h(sv.title),emptyState('📋','Sin respuestas aún','','',''));return}
  var content='<div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap">'+
    '<div style="padding:12px 20px;background:var(--blue);color:white;border-radius:var(--radius);text-align:center"><div style="font-family:Barlow Condensed,sans-serif;font-size:1.8rem;font-weight:900">'+total+'</div><div style="font-size:.75rem;opacity:.85">respuestas</div></div>'+
  '</div>';
  (sv.questions||[]).forEach(function(q){
    var answers=responses.map(function(r){return r.answers&&r.answers[q.id]}).filter(function(a){return a!==undefined&&a!==null&&a!==''});
    if(!answers.length)return;
    content+='<div style="margin-bottom:20px;padding:16px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg)">';
    content+='<div class="fw-700" style="margin-bottom:12px">'+h(q.text)+'</div>';
    if(q.type==='nps'||q.type==='stars'){
      var numAnswers=answers.map(Number);
      var maxVal=q.type==='nps'?10:5;
      var freq={};
      for(var i=(q.type==='nps'?0:1);i<=maxVal;i++)freq[i]=0;
      numAnswers.forEach(function(v){if(freq[v]!==undefined)freq[v]++;});
      var maxFreq=Math.max.apply(null,Object.values(freq))||1;
      var avg=(numAnswers.reduce(function(a,b){return a+b},0)/numAnswers.length).toFixed(1);
      content+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-family:Barlow Condensed,sans-serif;font-size:2rem;font-weight:900;color:var(--blue)">'+avg+'</span><span class="muted text-sm">promedio · '+answers.length+' respuestas</span></div>';
      content+='<div style="display:flex;align-items:flex-end;gap:4px;height:100px;border-bottom:2px solid var(--gray-200);padding-bottom:4px">';
      Object.entries(freq).forEach(function(entry){
        var val=entry[0],count=entry[1];var pct=maxFreq?Math.round(count/maxFreq*100):0;
        var isHigh=q.type==='nps'?(Number(val)>=9):(Number(val)>=4);var isMid=q.type==='nps'?(Number(val)>=7):(Number(val)===3);
        var barColor=isHigh?'var(--blue)':isMid?'#f59e0b':'#e5e7eb';
        content+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'+(count?'<div style="font-size:.65rem;font-weight:700;color:var(--gray-500)">'+count+'</div>':'<div>&nbsp;</div>')+'<div style="width:100%;background:'+barColor+';border-radius:4px 4px 0 0;height:'+pct+'px;min-height:'+(count?4:0)+'px"></div></div>';
      });
      content+='</div><div style="display:flex;gap:4px;margin-top:4px">';
      Object.keys(freq).forEach(function(val){content+='<div style="flex:1;text-align:center;font-size:.68rem;color:var(--gray-500)">'+val+'</div>';});
      content+='</div>';
    }else{
      var textFreq={};answers.forEach(function(a){var tx=String(a).trim();if(tx)textFreq[tx]=(textFreq[tx]||0)+1;});
      var sorted=Object.entries(textFreq).sort(function(a,b){return b[1]-a[1]});var maxTF=sorted.length?sorted[0][1]:1;
      content+='<div style="display:grid;gap:8px">';
      sorted.slice(0,15).forEach(function(entry){var text=entry[0],cnt=entry[1];var pct=Math.round(cnt/maxTF*100);
        content+='<div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="text-sm">'+h(text)+'</span><span class="muted text-sm">'+cnt+'</span></div><div style="height:6px;background:var(--gray-200);border-radius:3px"><div style="height:100%;width:'+pct+'%;background:var(--blue);border-radius:3px"></div></div></div>';
      });
      content+='</div>';
    }
    content+='</div>';
  });
  openModal('📊 Resultados: '+h(sv.title),content,true);
}

  var rows=students.map(function(s){

    return[s.id,s.firstName,s.paternal,s.maternal||'',s.dob,getAge(s.dob),s.gender||'',CATS[s.cat]?CATS[s.cat].label:s.cat,t.name,s.enrolledAt||'',s.medical||'',s.imageConsent?'Sí':'No',attRate(s)+'%',s.progress&&s.progress.technique||0,s.progress&&s.progress.tactics||0,s.progress&&s.progress.physical||0,s.progress&&s.progress.attitude||0,avgProgress(s),(s.parents&&s.parents[0]&&s.parents[0].name)||'',(s.parents&&s.parents[0]&&s.parents[0].phone)||'',(s.parents&&s.parents[0]&&s.parents[0].email)||'',pay&&pay.month||'',pay&&pay.amount||0,pay&&pay.status||'Sin registro'];

function exportStudentsXLSX(){

// ─── PREVIEW IMAGE ───────────────────────────────────────────────────────────
function previewImg(input,previewId,dataId){
  var file=input.files[0];if(!file)return;
  var isVideo=file.type.startsWith('video/');
  if(isVideo){
    if(file.size>50*1024*1024){toast('El video debe pesar menos de 50 MB');return}
    var vr=new FileReader();vr.onload=function(e){var prev=document.getElementById(previewId);if(prev){prev.style.height='auto';prev.innerHTML='<video src="'+e.target.result+'" style="width:100%;max-height:280px;border-radius:var(--radius);display:block;background:#000" controls playsinline></video>';}var data=document.getElementById(dataId);if(data)data.value=e.target.result;};vr.readAsDataURL(file);return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');var MAX=800;var w=img.width,h2=img.height;
      if(w>MAX){h2=Math.round(h2*MAX/w);w=MAX;}if(h2>800){w=Math.round(w*800/h2);h2=800;}
      canvas.width=w;canvas.height=h2;canvas.getContext('2d').drawImage(img,0,0,w,h2);
      var compressed=canvas.toDataURL('image/jpeg',0.7);
      var prev=document.getElementById(previewId);if(prev){prev.style.height='auto';prev.innerHTML='<img src="'+compressed+'" style="width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius);display:block">';}
      var data=document.getElementById(dataId);if(data)data.value=compressed;
      toast('Imagen lista ('+Math.round(compressed.length*0.75/1024)+' KB) ✓');
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}
function clearImg(previewId,dataId){var p=document.getElementById(previewId);if(p)p.innerHTML='Sin imagen';var d=document.getElementById(dataId);if(d)d.value='';}

    '<div class="form-group"><label class="form-label">Mensaje</label><textarea class="form-textarea" id="bc-msg" style="min-height:80px"></textarea></div>'+
    '<button class="btn btn-primary btn-full" onclick="saveBroadcast()">📢 Enviar</button>',true);

function saveBroadcast(){
  var selected=[].slice.call(document.querySelectorAll('.bc-user:checked'));
  var title=(document.getElementById('bc-title')||{value:''}).value.trim();
  var msg=(document.getElementById('bc-msg')||{value:''}).value.trim();
  if(!selected.length){toast('Selecciona al menos un destinatario');return}
  if(!title||!msg){toast('Completa asunto y mensaje');return}
  var myProfile=getMyProfile();var myId=myProfile&&myProfile.id;
  var participantIds=[myId];var roles=new Set([ST.role]);var names=[];
  selected.forEach(function(el){participantIds.push(el.value);roles.add(el.dataset.role);names.push(el.dataset.name);});
  var now=new Date();var time=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var unread={};[...roles].forEach(function(r){unread[r]=r===ST.role?0:1});
  var conv={id:'bc-'+Date.now(),title:'📢 '+title,scope:'Comunicado · '+names.length+' destinatarios',roles:[...roles],participantIds:participantIds,allowReplies:false,unread:unread,messages:[{author:(myProfile&&myProfile.name)||ST.role,role:ST.role,body:msg,time:time}]};
  ST.data.conversations=ST.data.conversations||[];ST.data.conversations.unshift(conv);ST.selectedConversationId=conv.id;
  save();closeModal();ST.view='messages';render();toast('📢 Comunicado enviado a '+names.length+' personas ✓');
}

// ─── CLEAN LEGACY ────────────────────────────────────────────────────────────
function cleanLegacyData(){
  if(!ST.data.lessons)return;
  var validTimes=new Set(['16:00-18:00','18:00-20:00','Por acordar','Rotación','Evento']);
  var before=ST.data.lessons.length;
  ST.data.lessons=ST.data.lessons.filter(function(l){
    if(l.isEvent)return true;
    if(!l.time)return true;
    var validNew=validTimes.has(l.time)||/^(Lun|Mar|Mi|Jue|16:|18:|Por|Rot)/.test(l.time);
    return validNew;
  });
  var removed=before-ST.data.lessons.length;
  if(removed>0){save();console.log('Cleaned',removed,'legacy lessons');}
}
